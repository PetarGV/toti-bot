# Fly.io deployment config.
# If the app name is taken globally on Fly, change it here and re-run setup.

app = "toti-bot"
primary_region = "fra"   # Frankfurt — change to your closest Fly region

[env]
  TZ = "UTC"

# Persistent SQLite + logs + backups live here. Created with:
#   fly volumes create data --size 1 --region fra
[[mounts]]
  source = "data"
  destination = "/app/data"

# The bot needs an always-on Discord WebSocket connection, so the machine
# must NEVER auto-stop on idle (the default `fly launch` config would).
[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "20s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

# 512MB is comfortable headroom; 256MB may OOM with discord.js + sql.js.
[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
